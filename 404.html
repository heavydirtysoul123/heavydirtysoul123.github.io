<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | Steven Shawn Flores D.</title>
<meta name="robots" content="noindex, follow">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #0A0E1A;
    color: #f1f5f9;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    overflow: hidden;
  }
  .grid-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .content { position: relative; z-index: 1; text-align: center; max-width: 500px; }
  .code { font-size: 8rem; font-weight: 800; line-height: 1; color: #00D4FF; opacity: 0.3; position: absolute; top: -3rem; left: 50%; transform: translateX(-50%); font-family: 'JetBrains Mono', monospace; pointer-events: none; }
  h1 { font-size: 2rem; font-weight: 700; margin-bottom: 1rem; }
  p { color: #94a3b8; line-height: 1.7; margin-bottom: 2rem; font-size: 1.1rem; }
  .btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.75rem 1.75rem;
    border-radius: 10px;
    font-weight: 600; font-size: 0.95rem;
    background: #00D4FF; color: #0A0E1A;
    text-decoration: none;
    transition: all 0.3s ease;
  }
  .btn:hover { background: #33DDFF; box-shadow: 0 0 30px rgba(0,212,255,0.3); transform: translateY(-2px); }
  .terminal { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: #00D4FF; margin-bottom: 2rem; }
  .terminal span { color: #94a3b8; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="grid-bg"></div>
<div class="content">
  <div class="code">404</div>
  <div class="terminal">$ <span>find /page --status</span><br>→ not_found</div>
  <h1>Lost in the terminal?</h1>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back on course.</p>
  <a href="/" class="btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Return Home
  </a>
</div>
</body>
</html>
